name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up MinGW
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Compile C Code
      run: |
        cd "职工信息管理系统"
        gcc -o manager.exe main.c

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v3
      with:
        name: employee-manager-windows
        path: "职工信息管理系统/manager.exe"
