name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        update: true
        install: mingw-w64-x86_64-gcc

    - name: Compile C Code
      shell: msys2 {0}
      run: |
        cd "职工信息管理系统"
        gcc -o manager.exe main.c

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: employee-manager-windows
        path: "职工信息管理系统/manager.exe"
